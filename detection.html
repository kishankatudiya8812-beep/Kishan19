<h1>UPI Fraud Detection</h1>

<p>
Enter transaction details below to perform a demo fraud check.
This project is for educational purposes only.
</p>

<label>UPI ID</label>
<input type="text" id="upi" placeholder="example@upi">

<label>Transaction Amount (₹)</label>
<input type="number" id="amount" placeholder="Enter amount">

<label>Transaction Type</label>

<select id="type">
<option>Send Money</option>
<option>Receive Money</option>
<option>Collect Request</option>
<option>QR Code Payment</option>
</select>

<button onclick="checkFraud()">
Check Transaction
</button>

<div id="result"></div>

</div>
<script>

function checkFraud(){

let upi=document.getElementById("upi").value.trim().toLowerCase();
let amount=parseInt(document.getElementById("amount").value);
let type=document.getElementById("type").value;

let result=document.getElementById("result");

if(upi==="" || isNaN(amount)){

result.style.display="block";
result.style.background="#ff9800";
result.innerHTML="⚠ Please enter all transaction details.";
return;

}

/* Demo Rules */

if(
upi.includes("fake") ||
upi.includes("fraud") ||
upi.includes("scam")
){

result.style.display="block";
result.style.background="#ff3b30";
result.innerHTML="❌ High Risk! This UPI ID looks suspicious. Do NOT continue.";
return;

}

if(type==="Collect Request"){

result.style.display="block";
result.style.background="#ff9800";
result.innerHTML="⚠ Verify the sender before approving any collect request.";

return;

}

if(amount>=50000){

result.style.display="block";
result.style.background="#ff9800";
result.innerHTML="⚠ Large transaction detected. Verify beneficiary details before proceeding.";

return;

}

if(type==="QR Code Payment"){

result.style.display="block";
result.style.background="#ffd54f";
result.style.color="#000";
result.innerHTML="ℹ Always verify the QR code before making payment.";

return;

}

/* Safe */

result.style.display="block";
result.style.background="#00c853";
result.innerHTML="✅ No obvious risk detected. Continue carefully and never share your UPI PIN.";

}

</script>
